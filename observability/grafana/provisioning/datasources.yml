# Grafana datasource provisioning

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: ratelimiter
    user: ratelimiter
    secureJsonData:
      password: ratelimiter
    jsonData:
      sslmode: disable
      timescaledb: true
    editable: false

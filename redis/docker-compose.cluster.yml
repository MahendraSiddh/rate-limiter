# ─────────────────────────────────────────────────────────────────────────────
# Redis 7 Cluster — 6 nodes (3 primary + 3 replica)
#
# Ports (host → container):
#   7001 → redis-node-1:6379   (primary)
#   7002 → redis-node-2:6379   (primary)
#   7003 → redis-node-3:6379   (primary)
#   7004 → redis-node-4:6379   (replica of node-1)
#   7005 → redis-node-5:6379   (replica of node-2)
#   7006 → redis-node-6:6379   (replica of node-3)
#   9121 → redis-exporter:9121 (Prometheus metrics)
#
# Usage (standalone cluster bringup):
#   docker compose -f redis/docker-compose.cluster.yml up -d
#
# Or sourced automatically via the root docker-compose.yml override.
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

x-redis-node: &redis-node
  image: redis:7.2-alpine
  env_file: ./redis.env
  networks:
    - redis-cluster
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "redis-cli", "-p", "6379", "ping"]
    interval: 5s
    timeout: 3s
    retries: 10
    start_period: 5s

services:
  # ── Primary nodes ─────────────────────────────────────────────────────────

  redis-node-1:
    <<: *redis-node
    container_name: redis-node-1
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 6379
      --cluster-announce-ip redis-node-1
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "7001:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-1:/data

  redis-node-2:
    <<: *redis-node
    container_name: redis-node-2
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 6379
      --cluster-announce-ip redis-node-2
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "7002:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-2:/data

  redis-node-3:
    <<: *redis-node
    container_name: redis-node-3
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 6379
      --cluster-announce-ip redis-node-3
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "7003:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-3:/data

  # ── Replica nodes ─────────────────────────────────────────────────────────

  redis-node-4:
    <<: *redis-node
    container_name: redis-node-4
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 6379
      --cluster-announce-ip redis-node-4
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "7004:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-4:/data

  redis-node-5:
    <<: *redis-node
    container_name: redis-node-5
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 6379
      --cluster-announce-ip redis-node-5
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "7005:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-5:/data

  redis-node-6:
    <<: *redis-node
    container_name: redis-node-6
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 6379
      --cluster-announce-ip redis-node-6
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
    ports:
      - "7006:6379"
    volumes:
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-6:/data

  # ── Cluster initializer (one-shot) ───────────────────────────────────────
  #
  # Waits for all 6 nodes to become healthy, then bootstraps the cluster with
  # 3 masters and 1 replica each. Runs once and exits (restart: "no").

  redis-cluster-init:
    image: redis:7.2-alpine
    container_name: redis-cluster-init
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    entrypoint: /scripts/init-cluster.sh
    volumes:
      - ./scripts/init-cluster.sh:/scripts/init-cluster.sh:ro
    networks:
      - redis-cluster
    restart: "no"

  # ── Redis Exporter — Prometheus sidecar ──────────────────────────────────
  #
  # Scrapes metrics from all cluster nodes. Exposes the unified endpoint at
  # :9121/metrics for Prometheus to scrape.
  #
  # Key metrics exposed:
  #   redis_keyspace_hits_total            → cache hit rate per bucket
  #   redis_keyspace_misses_total          → cache miss rate
  #   redis_evicted_keys_total             → eviction rate (volatile-lru)
  #   redis_commands_duration_seconds_*    → command latency (p50, p99, p999)
  #   redis_cluster_slots_assigned         → slot health
  #   redis_mem_fragmentation_ratio        → memory fragmentation

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0-alpine
    container_name: redis-exporter
    ports:
      - "9121:9121"
    environment:
      # Point exporter at node-1; it will autodiscover all cluster members
      REDIS_ADDR: "redis://redis-node-1:6379"
      # Scrape every cluster node for aggregated keyspace hit/miss stats
      REDIS_EXPORTER_CLUSTER_CONNECTIONS: "redis-node-1:6379,redis-node-2:6379,redis-node-3:6379,redis-node-4:6379,redis-node-5:6379,redis-node-6:6379"
      # Export key-space event counts broken down by database (for hit-rate calc)
      REDIS_EXPORTER_SKIP_TLS_VERIFICATION: "true"
      # Track per-command latency percentiles (p99 target: <2ms)
      REDIS_EXPORTER_LATENCY_HISTORY_INTERVAL_MILLISECONDS: "1000"
    depends_on:
      redis-node-1:
        condition: service_healthy
    networks:
      - redis-cluster
    restart: unless-stopped

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  redis-data-4:
  redis-data-5:
  redis-data-6:

networks:
  redis-cluster:
    driver: bridge
    name: redis-cluster

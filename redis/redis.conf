# ─────────────────────────────────────────────────────────────────────────────
# redis.conf — Shared configuration for all 6 Redis Cluster nodes
#
# Applied to: redis-node-{1..6}
# Image:      redis:7.2-alpine
#
# Design choices:
#   • appendonly no   — pure sliding-window cache; durability via cluster
#                       replication is sufficient. AOF disabled for throughput.
#   • maxmemory-policy volatile-lru — only TTL-bearing keys (rate buckets,
#                       model snapshots) are eligible for eviction. Preserves
#                       cluster metadata keys that have no TTL.
#   • maxmemory 512mb — hard limit per node. volatile-lru kicks in before OOM.
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ───────────────────────────────────────────────────────────────────

port 6379
bind 0.0.0.0
protected-mode no

tcp-backlog 511
timeout 300
tcp-keepalive 60

# ── Cluster ───────────────────────────────────────────────────────────────────

cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-require-full-coverage no
cluster-allow-reads-when-down no

# ── Memory ───────────────────────────────────────────────────────────────────

maxmemory 512mb

# volatile-lru: evict only keys with a TTL set, using LRU policy.
# Rate-bucket keys always carry an EXPIRE; cluster-internal keys never do,
# so they are protected from eviction.
maxmemory-policy volatile-lru

# ── Persistence — disabled (pure cache mode) ──────────────────────────────────
#
# All sliding-window counters and model blobs are ephemeral by design.
# Cluster replication (1 replica per primary) provides HA without AOF overhead.

appendonly no
save ""

# ── Performance tuning ───────────────────────────────────────────────────────

# Lazy free — free expired/evicted keys in background threads to avoid
# blocking the event loop on large key deletions.
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes

# Disable slow-log threshold; emit all commands ≥ 1ms to the slow log.
slowlog-log-slower-than 1000
slowlog-max-len 256

# Latency tracking (used by redis-exporter for p99 histograms).
latency-tracking yes
latency-tracking-info-percentiles 50 99 99.9

# ── Replication ───────────────────────────────────────────────────────────────

# Disable disk-based RDB for replication: use socket-based transfer instead.
repl-diskless-sync yes
repl-diskless-sync-delay 1

# ── Logging ───────────────────────────────────────────────────────────────────

loglevel notice
logfile ""

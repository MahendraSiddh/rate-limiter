# Redis Cluster Node Configuration
# Used by all 6 nodes in the cluster

port 6379
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
appendonly yes
appendfsync everysec

# Memory policy — evict least-recently-used keys when maxmemory is hit
maxmemory 256mb
maxmemory-policy allkeys-lru

# Performance tuning
tcp-backlog 511
timeout 300
tcp-keepalive 60

# Logging
loglevel notice

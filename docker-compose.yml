version: "3.9"

services:
  # ─────────────────────────────────────────────
  #  NGINX / OpenResty — Entry point (L7 proxy)
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - decision-sock:/tmp
    depends_on:
      - decision-engine
      - redis-node-1
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Decision Engine — Go service (core logic)
  # ─────────────────────────────────────────────
  decision-engine:
    build:
      context: ./decision-engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - decision-sock:/tmp
    environment:
      - REDIS_ADDRS=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379,redis-node-4:6379,redis-node-5:6379,redis-node-6:6379
      - KAFKA_BROKERS=kafka:9092
      - ML_SIDECAR_ADDR=ml-sidecar:50051
      - POSTGRES_DSN=postgres://ratelimiter:ratelimiter@postgres:5432/ratelimiter?sslmode=disable
    depends_on:
      - redis-node-1
      - kafka
      - postgres
      - ml-sidecar
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  ML Sidecar — Python anomaly scoring (gRPC)
  # ─────────────────────────────────────────────
  ml-sidecar:
    build:
      context: ./ml-sidecar
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - REDIS_URL=redis://redis-node-1:6379/0
      - KAFKA_BROKERS=kafka:9092
      - MODEL_PATH=/models/anomaly_detector.onnx
    volumes:
      - ml-models:/models
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Redis Cluster — 6 nodes (3 masters + 3 replicas)
  # ─────────────────────────────────────────────
  redis-node-1:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-1:/data
    networks:
      - ratelimiter
    restart: unless-stopped

  redis-node-2:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-2:/data
    networks:
      - ratelimiter
    restart: unless-stopped

  redis-node-3:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-3:/data
    networks:
      - ratelimiter
    restart: unless-stopped

  redis-node-4:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-4:/data
    networks:
      - ratelimiter
    restart: unless-stopped

  redis-node-5:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-5:/data
    networks:
      - ratelimiter
    restart: unless-stopped

  redis-node-6:
    image: redis:7.2-alpine
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data-6:/data
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Redis Cluster Init — one-shot bootstrap
  # ─────────────────────────────────────────────
  redis-cluster-init:
    image: redis:7.2-alpine
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    entrypoint: >
      sh -c "sleep 5 &&
        redis-cli --cluster create
          redis-node-1:6379 redis-node-2:6379 redis-node-3:6379
          redis-node-4:6379 redis-node-5:6379 redis-node-6:6379
          --cluster-replicas 1 --cluster-yes"
    networks:
      - ratelimiter
    restart: "no"

  # ─────────────────────────────────────────────
  #  Kafka + Zookeeper
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ratelimiter
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    depends_on:
      - zookeeper
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  PostgreSQL + TimescaleDB
  # ─────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ratelimiter
      POSTGRES_PASSWORD: ratelimiter
      POSTGRES_DB: ratelimiter
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
      - pg-data:/var/lib/postgresql/data
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Prometheus
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - ratelimiter
    restart: unless-stopped

  # ─────────────────────────────────────────────
  #  Grafana
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ratelimiter
    restart: unless-stopped

volumes:
  redis-data-1:
  redis-data-2:
  redis-data-3:
  redis-data-4:
  redis-data-5:
  redis-data-6:
  pg-data:
  prometheus-data:
  grafana-data:
  ml-models:
  decision-sock:

networks:
  ratelimiter:
    driver: bridge

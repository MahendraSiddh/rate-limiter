# ─────────────────────────────────────────────────────────────
#  OpenResty master config — Adaptive Rate Limiter entry point
# ─────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /usr/local/openresty/nginx/logs/error.log warn;
pid        /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    # ── Basics ──────────────────────────────────────────────
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /usr/local/openresty/nginx/logs/access.log main;

    # ── Lua paths ───────────────────────────────────────────
    lua_package_path  "/usr/local/openresty/lualib/ratelimiter/?.lua;;";
    lua_package_cpath "/usr/local/openresty/lualib/?.so;;";

    # ── Shared dictionaries ─────────────────────────────────
    #  ip_state:  per-IP sliding-window counters (50 MB)
    lua_shared_dict ip_state 50m;

    # ── DNS resolver (Docker internal DNS) ─────────────────
    #  127.0.0.11 is Docker's embedded DNS server.
    #  Allows variable-based proxy_pass to resolve at runtime.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ── Virtual-host configs ────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}

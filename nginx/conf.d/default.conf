# ─────────────────────────────────────────────────────────────
#  default.conf — HTTP + HTTPS server blocks
# ─────────────────────────────────────────────────────────────

# ── HTTP (port 80) ──────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Rate-limit access check on every request
    location / {
        access_by_lua_file /usr/local/openresty/lualib/ratelimiter/access.lua;

        set $upstream http://decision-engine:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Health-check (no rate-limit, no proxy)
    location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # Prometheus metrics endpoint
    location /metrics {
        access_log off;
        content_by_lua_file /usr/local/openresty/lualib/ratelimiter/metrics.lua;
    }
}

# ── HTTPS (port 443) ───────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Rate-limit access check on every request
    location / {
        access_by_lua_file /usr/local/openresty/lualib/ratelimiter/access.lua;

        set $upstream http://decision-engine:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # Health-check (no rate-limit, no proxy)
    location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # Prometheus metrics endpoint
    location /metrics {
        access_log off;
        content_by_lua_file /usr/local/openresty/lualib/ratelimiter/metrics.lua;
    }
}

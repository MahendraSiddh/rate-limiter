syntax = "proto3";

package scorer;

option go_package = "github.com/ratelimiter/decision-engine/proto";

// FeatureVector holds the 12-field fingerprint extracted by the Nginx Lua layer.
message FeatureVector {
  string client_ip        = 1;  // Raw IPv4/IPv6 string
  string ja3_hash         = 2;  // TLS JA3 fingerprint hash ("none" for plain HTTP)
  string user_agent_hash  = 3;  // MD5 of User-Agent header

  double req_rate_1s      = 4;  // Requests in last 1 second
  double req_rate_10s     = 5;  // Requests in last 10 seconds
  double req_rate_60s     = 6;  // Requests in last 60 seconds

  string http_method      = 7;  // GET, POST, etc.
  string uri_hash         = 8;  // MD5 of request URI
  int64  content_length   = 9;  // Content-Length header value (0 if absent)
  int32  header_count     = 10; // Number of HTTP headers
  int32  is_http2         = 11; // 1 = HTTP/2, 0 = HTTP/1.x
  int64  unix_timestamp   = 12; // Unix epoch seconds
}

// ScoreResponse carries the model output.
message ScoreResponse {
  float  anomaly_score  = 1; // 0.0 (normal) – 1.0 (highly anomalous)
  string model_version  = 2; // Opaque model identifier / semver
}

// MLScorer is the anomaly scoring service hosted by the Python ML sidecar.
service MLScorer {
  rpc Score(FeatureVector) returns (ScoreResponse);
}
